services:
  - type: web
    name: axonflow-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python app.py
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://axonflow.in
  - type: static
    name: axonflow-frontend
    env: static
    region: oregon
    plan: free
    publishPath: frontend
    routes:
      - type: rewrite
        source: /about-us
        destination: /about-us.html
      - type: rewrite
        source: /what-we-do
        destination: /what-we-do.html
      - type: rewrite
        source: /who-we-are
        destination: /who-we-are.html
      - type: rewrite
        source: /careers/*
        destination: /careers/index.html
      - type: rewrite
        source: /agency/*
        destination: /agency/index.html
      - type: rewrite
        source: /*
        destination: /index.html