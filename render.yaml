services:
  - type: web
    name: axonflow-platform
    env: static
    staticPublishPath: ./
    buildCommand: echo "Static site - no build needed"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html