services:
  - type: web
    name: axonflow-platform
    env: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html