<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AxonFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <h1 class="text-4xl font-bold mb-4">🎉 Welcome to AxonFlow!</h1>
            <p class="text-xl mb-8">SSO Authentication Successful</p>
            <div class="space-y-4">
                <a href="academy.html" class="block bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg">
                    Go to Academy
                </a>
                <a href="index.html" class="block bg-gray-600 hover:bg-gray-700 px-6 py-3 rounded-lg">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Handle OAuth callback
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            // Process OAuth code and create session
            console.log('OAuth code received:', code);
            
            // Redirect to academy after processing
            setTimeout(() => {
                window.location.href = 'academy.html';
            }, 2000);
        }
    </script>
</body>
</html>
