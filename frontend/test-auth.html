<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxonFlow - Authentication Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="sso-auth.js"></script>
    <script src="referral-rewards.js"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-slate-900 rounded-2xl p-8 border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">🚀 AxonFlow Platform</h1>
            <p class="text-slate-300">Authentication Test</p>
        </div>
        
        <div class="space-y-4">
            <button class="google-signin w-full bg-white text-gray-900 font-semibold py-3 rounded-lg hover:bg-gray-100 flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span>Test Google Sign-In</span>
            </button>
            
            <div id="user-info" class="hidden bg-green-900/20 border border-green-500/30 rounded-lg p-4">
                <h3 class="text-green-300 font-bold mb-2">✅ Authentication Success!</h3>
                <div id="user-details"></div>
            </div>
            
            <div id="error-info" class="hidden bg-red-900/20 border border-red-500/30 rounded-lg p-4">
                <h3 class="text-red-300 font-bold mb-2">❌ Authentication Error</h3>
                <div id="error-details"></div>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm">
                If authentication works, your platform is ready! 🎉
            </p>
        </div>
    </div>

    <script>
        // Test authentication
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔥 Firebase Config:', firebaseConfig);
            
            // Listen for auth state changes
            if (typeof firebase !== 'undefined' && firebase.auth) {
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        document.getElementById('user-info').classList.remove('hidden');
                        document.getElementById('error-info').classList.add('hidden');
                        document.getElementById('user-details').innerHTML = `
                            <p><strong>Name:</strong> ${user.displayName}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                            <p><strong>UID:</strong> ${user.uid}</p>
                            <p class="text-green-400 mt-2">🎯 Referral code generated!</p>
                        `;
                        
                        // Generate referral code
                        const referralCode = 'AXN' + user.uid.substring(0, 6).toUpperCase();
                        console.log('🎯 Referral Code:', referralCode);
                        
                    } else {
                        document.getElementById('user-info').classList.add('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
